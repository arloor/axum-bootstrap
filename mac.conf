[General]
loglevel = info
allow-wifi-access = false
proxy-test-url = http://connectivitycheck.gstatic.com/generate_204
internet-test-url = http://baidu.com/
test-timeout = 5
http-api-web-dashboard = true
http-api = arloor@0.0.0.0:9090
# encrypted-dns-server = https://1.12.12.12/dns-query,https://120.53.53.53/dns-query
hijack-dns = *:53

[Proxy]
hi = https, hi.arloor.dev, 444, username=arloor, password=good, always-use-connect=true, skip-cert-verify=true
hi2 = https, hii.arloor.dev, 444, username=arloor, password=good, always-use-connect=true, skip-cert-verify=true
美国 = https, us.arloor.dev, 444, username=arloor, password=good, always-use-connect=true, skip-cert-verify=true
bwg = https, bwg.arloor.dev, 444, username=arloor, password=good, always-use-connect=true, skip-cert-verify=true
guest = https, us.arloor.dev, 9443, username=you, password=arewelcome, always-use-connect=true, skip-cert-verify=true
sslocal = socks5, 127.0.0.1, 2080, ip-version=v4-only, block-quic=on
tt = https, tt.arloor.com, 444, username=arloor, password=good, always-use-connect=true, block-quic=off, skip-cert-verify=true
pi = https, pi.arloor.com, 444, username=arloor, password=good, always-use-connect=true, block-quic=off, skip-cert-verify=true

[Proxy Group]
通用 = select, hi, hi2, 美国, bwg, DIRECT, guest, sslocal, pi
电报 = select, hi, hi2, 美国, bwg, DIRECT, guest, sslocal, pi
奈飞 = select, hi, hi2, 美国, bwg, DIRECT, guest, sslocal, pi
推特 = select, hi, hi2, 美国, bwg, DIRECT, guest, sslocal, pi
openai = select, hi, hi2, 美国, bwg, DIRECT, guest, sslocal, pi
codespaces = select, hi, hi2, 美国, bwg, DIRECT, guest, sslocal, pi
copilot = select, hi, hi2, 美国, bwg, DIRECT, guest, sslocal, pi
家里 = select, DIRECT, pi
直连 = select, DIRECT, pi

[Rule]
PROTOCOL,QUIC,REJECT-NO-DROP
PROTOCOL,UDP,DIRECT
IP-CIDR,100.80.0.0/16,DIRECT,no-resolve // 字节内网dns
IP-CIDR,192.168.5.0/24,家里,no-resolve // 家里mac mini
AND,((PROCESS-NAME,*socat*), (DEST-PORT,22), (DOMAIN-KEYWORD,arloor,extended-matching)),家里
DOMAIN-SUFFIX,i.imgur.com,美国,extended-matching
DOMAIN-SUFFIX,vscode.download.prss.microsoft.com,通用,extended-matching
DOMAIN-SET,http://cdn.arloor.com/surge/steamcn.yaml,DIRECT,extended-matching
DOMAIN-SUFFIX,services.googleapis.cn,通用,extended-matching
DOMAIN-SET,http://cdn.arloor.com/surge/mine.yaml,DIRECT,extended-matching
DOMAIN-SET,http://cdn.arloor.com/surge/apple.yaml,DIRECT,extended-matching
DOMAIN-SET,http://cdn.arloor.com/surge/twitter.yaml,推特,extended-matching
DOMAIN-SET,http://cdn.arloor.com/surge/netflix.yaml,奈飞,extended-matching
DOMAIN-SET,http://cdn.arloor.com/surge/openai.yaml,openai,extended-matching
DOMAIN-SET,http://cdn.arloor.com/surge/copilot.yaml,copilot,extended-matching
DOMAIN-SET,http://cdn.arloor.com/surge/codespaces.yaml,codespaces,extended-matching
DOMAIN-SET,https://us.arloor.dev/https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/proxy.txt,通用,extended-matching
RULE-SET,http://cdn.arloor.com/surge/telegram.yaml,电报,no-resolve
RULE-SET,LAN,DIRECT
GEOIP,CN,直连
FINAL,通用

